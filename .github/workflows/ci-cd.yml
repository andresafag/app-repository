name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          declare -A IMAGES=(
            ["frontend"]="python-frontend"
            ["db"]="postgres-db"
          )
          VERSION=${{ github.run_number }}
          
          for folder in "${!IMAGES[@]}"; do
            echo "Building image for $folder..."
            cd "$folder"
            docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${IMAGES[$folder]}:v$VERSION .
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/${IMAGES[$folder]}:v$VERSION
            cd ..
          done


  update-manifests:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Manifests Repo
        uses: actions/checkout@v3
        with:
          repository: andresafag/app-manifests # TU REPO DE MANIFIESTOS
          token: ${{ secrets.GHTOKEN }} # Un Personal Access Token de GitHub

      - name: Update values.yaml
        run: |
          # Usamos el comando sed que ya viene en Linux para editar el archivo
          # Es más rápido y no requiere instalar nada extra
          sed -i 's/tag: .*/tag: v"${{ github.run_number }}"/' values.yaml
          # Verificamos el cambio para el log
          cat values.yaml

      - name: Commit and Push changes
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add values.yaml
          git commit -m "chore: update frontend image to ${{ github.run_number }}"
          git push

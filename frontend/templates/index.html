<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Flask Store</title>
    <!-- Bootstrap para estructura -->
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <!-- Nuestro CSS personalizado -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<!-- ... (Igual al anterior, solo cambia la sección del botón y el link del carrito) ... -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" href="/">✨ TECH-STORE</a>
        <div class="d-flex">
            <a href="/cart" class="btn btn-outline-light position-relative">
                🛒 Carrito
                <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                    {{ cart_count }}
                </span>
            </a>
        </div>
    </div>
</nav>

    <header class="py-5 text-center container">
        <h1 class="display-4 fw-bold">Nuestra Colección</h1>
        <p class="lead text-muted">Descubre los mejores productos seleccionados para ti.</p>
    </header>

    <div class="container pb-5">
        <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-4 g-4">
            {% for p in productos %}
            <div class="col">
                <div class="card h-100 product-card">
                    <div class="overflow-hidden">
                        <img src="{{ p.imagen }}" class="card-img-top product-image" alt="{{ p.nombre }}">
                    </div>
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title mb-1 text-truncate">{{ p.nombre }}</h5>
                        <p class="text-muted small">Categoría Tech</p>
                        <div class="mt-auto d-flex justify-content-between align-items-center">
                            <span class="price-tag">${{ p.precio }}</span>
                            <a href="{{ url_for('add_to_cart', product_id=p.id) }}" class="btn btn-primary btn-buy px-3">
                            Agregar
                        </a>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <footer class="py-4 bg-dark text-white text-center mt-5">
        <p class="mb-0">&copy; 2024 Mi Tienda Flask - Hecho con ❤️</p>
    </footer>
</body>
</html>
